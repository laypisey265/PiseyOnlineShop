<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pisey Online Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Kantumruy+Pro:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Kantumruy Pro','Baloo 2',sans-serif;background:#0D0D0D;color:#F5F0E8;min-height:100vh}

/* NAV */
nav{background:#111;border-bottom:1px solid #2a2a2a;padding:0 1.5rem;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{font-family:'Baloo 2',sans-serif;font-size:1.35rem;font-weight:800;color:#F5F0E8;letter-spacing:-0.5px}
.logo em{color:#E8C547;font-style:normal}
.nav-r{display:flex;align-items:center;gap:10px}
.cart-pill{background:#E8C547;color:#0D0D0D;border:none;padding:6px 16px;border-radius:99px;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:0.88rem;cursor:pointer;display:flex;align-items:center;gap:6px;transition:opacity 0.15s}
.cart-pill:hover{opacity:0.85}
.badge{background:#E84747;color:#fff;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700}

/* HERO */
.hero{padding:3rem 1.5rem 2.5rem;display:grid;grid-template-columns:1fr auto;gap:2rem;align-items:center;border-bottom:1px solid #1e1e1e}
.hero h1{font-family:'Baloo 2',sans-serif;font-size:2.6rem;font-weight:800;line-height:1.05;color:#F5F0E8}
.hero h1 span{color:#E8C547}
.hero p{font-size:0.95rem;color:#888;margin-top:0.6rem;line-height:1.6}
.hero-btn{margin-top:1.2rem;display:inline-block;background:#E8C547;color:#0D0D0D;border:none;padding:10px 24px;border-radius:8px;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:0.95rem;cursor:pointer;transition:opacity 0.15s}
.hero-btn:hover{opacity:0.85}
.hero-visual{width:120px;height:120px;background:#1a1a1a;border-radius:16px;border:1px solid #2a2a2a;display:flex;align-items:center;justify-content:center;font-size:4rem}

/* SHOP */
.shop{padding:1.5rem}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.5rem}
.f-btn{background:#1a1a1a;color:#888;border:1px solid #2a2a2a;padding:6px 14px;border-radius:6px;font-family:'Kantumruy Pro',sans-serif;font-size:0.82rem;font-weight:600;cursor:pointer;transition:all 0.15s}
.f-btn:hover{border-color:#444;color:#ccc}
.f-btn.on{background:#E8C547;color:#0D0D0D;border-color:#E8C547}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px}
.card{background:#111;border:1px solid #1e1e1e;border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color 0.15s,transform 0.15s}
.card:hover{border-color:#333;transform:translateY(-2px)}
.card-img{height:110px;display:flex;align-items:center;justify-content:center;font-size:3.5rem;background:#161616}
.card-body{padding:12px}
.card-tag{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px}
.card-name{font-size:0.88rem;font-weight:600;color:#F5F0E8;line-height:1.3}
.card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.card-price{font-family:'Baloo 2',sans-serif;font-size:1.05rem;font-weight:700;color:#E8C547}
.add-btn{background:#E8C547;color:#0D0D0D;border:none;border-radius:6px;width:30px;height:30px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center}
.add-btn:hover{opacity:0.8}
.add-btn.ok{background:#47C587}

/* CART DRAWER */
.drawer-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100}
.drawer-bg.on{display:block}
.drawer{position:fixed;right:0;top:0;height:100%;width:320px;background:#111;border-left:1px solid #222;z-index:101;transform:translateX(100%);transition:transform 0.28s;display:flex;flex-direction:column}
.drawer.on{transform:translateX(0)}
.drawer-head{padding:1rem 1.2rem;border-bottom:1px solid #222;display:flex;align-items:center;justify-content:space-between}
.drawer-head h3{font-family:'Baloo 2',sans-serif;font-size:1.1rem;font-weight:700;color:#F5F0E8}
.close-btn{background:none;border:1px solid #333;color:#888;width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:1rem}
.close-btn:hover{border-color:#555;color:#ccc}
.drawer-body{flex:1;overflow-y:auto;padding:1rem}
.ci{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #1e1e1e;align-items:center}
.ci-em{font-size:2rem;min-width:40px;text-align:center;background:#161616;border-radius:8px;height:40px;display:flex;align-items:center;justify-content:center}
.ci-info{flex:1}
.ci-name{font-size:0.85rem;font-weight:600;color:#F5F0E8}
.ci-price{font-size:0.85rem;color:#E8C547;font-weight:700;margin-top:2px}
.ci-qty{display:flex;align-items:center;gap:6px;margin-top:5px}
.ci-qty button{width:22px;height:22px;border-radius:4px;border:1px solid #333;background:none;color:#ccc;cursor:pointer;font-size:0.85rem}
.ci-qty button:hover{border-color:#555}
.ci-qty span{font-size:0.85rem;font-weight:700;min-width:18px;text-align:center;color:#F5F0E8}
.ci-rm{background:none;border:none;color:#444;cursor:pointer;font-size:1rem;transition:color 0.15s}
.ci-rm:hover{color:#E84747}
.drawer-foot{padding:1rem 1.2rem;border-top:1px solid #222}
.total-row{display:flex;justify-content:space-between;font-weight:700;font-size:1rem;color:#F5F0E8;margin-bottom:12px}
.total-row span:last-child{color:#E8C547}
.co-btn{width:100%;background:#E8C547;color:#0D0D0D;border:none;border-radius:8px;padding:12px;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;transition:opacity 0.15s}
.co-btn:hover{opacity:0.85}
.empty-msg{text-align:center;padding:2rem 1rem;color:#444;font-size:0.9rem;line-height:2}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);background:#E8C547;color:#0D0D0D;padding:8px 20px;border-radius:8px;font-weight:700;font-size:0.85rem;z-index:200;opacity:0;transition:all 0.25s;white-space:nowrap;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* FOOTER */
footer{padding:1.5rem;border-top:1px solid #1e1e1e;text-align:center;color:#444;font-size:0.8rem}
footer span{color:#E8C547}
</style>
</head>
<body>

<nav>
  <div class="logo">Pisey <em>Shop</em></div>
  <div class="nav-r">
    <button class="cart-pill" onclick="openCart()">🛒 កន្ត្រក <span class="badge" id="cnt">0</span></button>
  </div>
</nav>

<section class="hero">
  <div>
    <h1>ទំនិញល្អ<br><span>តម្លៃសមរម្យ</span></h1>
    <p>ស្វែងរកអ្វីៗដែលអ្នកត្រូវការ<br>ដឹកជញ្ជូនដល់ផ្ទះ 🚀</p>
    <button class="hero-btn" onclick="document.getElementById('shop').scrollIntoView({behavior:'smooth'})">ទិញឥឡូវ →</button>
  </div>
  <div class="hero-visual">🛍️</div>
</section>

<section class="shop" id="shop">
  <div class="filters">
    <button class="f-btn on" data-c="all" onclick="filter('all',this)">ទាំងអស់</button>
    <button class="f-btn" data-c="fashion" onclick="filter('fashion',this)">👗 Fashion</button>
    <button class="f-btn" data-c="food" onclick="filter('food',this)">🍜 អាហារ</button>
    <button class="f-btn" data-c="elec" onclick="filter('elec',this)">📱 Electronics</button>
    <button class="f-btn" data-c="home" onclick="filter('home',this)">🏠 ផ្ទះ</button>
  </div>
  <div class="grid" id="grid"></div>
</section>

<footer>
  <p>© 2025 <span>Pisey Online Shop</span> — Made with ❤️ in Cambodia</p>
</footer>

<!-- CART DRAWER -->
<div class="drawer-bg" id="bg" onclick="closeCart()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <h3>🛒 កន្ត្រករបស់ខ្ញុំ</h3>
    <button class="close-btn" onclick="closeCart()">✕</button>
  </div>
  <div class="drawer-body" id="clist"></div>
  <div class="drawer-foot">
    <div class="total-row"><span>សរុប</span><span id="ctotal">$0.00</span></div>
    <button class="co-btn" onclick="checkout()">✅ ទូទាត់ប្រាក់</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const cats = {fashion:'#D4537E', food:'#1D9E75', elec:'#378ADD', home:'#7F77DD'};
const catLabel = {fashion:'Fashion', food:'អាហារ', elec:'Electronics', home:'ផ្ទះ'};

const products = [
  {id:1, n:'អាវទ្រនាប់ Khmer',    e:'👕', p:8.99,   c:'fashion'},
  {id:2, n:'ស្បែកជើង Sneaker',     e:'👟', p:24.99,  c:'fashion'},
  {id:3, n:'កាបូប Tote Bag',       e:'👜', p:14.50,  c:'fashion'},
  {id:4, n:'វ៉ែនតាស្រស់',          e:'🕶️', p:11.00,  c:'fashion'},
  {id:5, n:'គុយទាវបាយ',            e:'🍜', p:3.50,   c:'food'},
  {id:6, n:'នំបញ្ចុក',             e:'🍱', p:2.50,   c:'food'},
  {id:7, n:'Mango Juice ត្រជាក់',  e:'🥭', p:2.00,   c:'food'},
  {id:8, n:'កាហ្វេទឹកដោះគោ',       e:'☕', p:1.50,   c:'food'},
  {id:9, n:'Smartphone',           e:'📱', p:149.99, c:'elec'},
  {id:10,n:'Earbuds Wireless',     e:'🎧', p:39.99,  c:'elec'},
  {id:11,n:'Power Bank',           e:'🔋', p:18.99,  c:'elec'},
  {id:12,n:'Smart Watch',          e:'⌚', p:59.99,  c:'elec'},
  {id:13,n:'ចានក្លៀប Ceramic',     e:'🍽️', p:9.99,   c:'home'},
  {id:14,n:'ទៀន Aroma',            e:'🕯️', p:5.99,   c:'home'},
  {id:15,n:'ខ្នើយ Pillow',         e:'🛏️', p:7.50,   c:'home'},
  {id:16,n:'ភួយ Cozy',             e:'🧸', p:14.99,  c:'home'},
];

let activeCat = 'all';
let cart = JSON.parse(localStorage.getItem('pisey_cart') || '{}');

function saveCart() { localStorage.setItem('pisey_cart', JSON.stringify(cart)); }

function render() {
  const list = activeCat === 'all' ? products : products.filter(p => p.c === activeCat);
  document.getElementById('grid').innerHTML = list.map(p => `
    <div class="card">
      <div class="card-img">${p.e}</div>
      <div class="card-body">
        <div class="card-tag" style="color:${cats[p.c]}">${catLabel[p.c]}</div>
        <div class="card-name">${p.n}</div>
        <div class="card-foot">
          <div class="card-price">$${p.p.toFixed(2)}</div>
          <button class="add-btn" id="ab${p.id}" onclick="add(${p.id})">+</button>
        </div>
      </div>
    </div>`).join('');
}

function filter(c, el) {
  activeCat = c;
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  render();
}

function add(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  cart[id] = cart[id] || {...p, qty: 0};
  cart[id].qty++;
  saveCart();
  updateCount();
  toast(p.e + ' ' + p.n + ' បានបន្ថែម!');
  const b = document.getElementById('ab' + id);
  if (b) { b.textContent = '✓'; b.classList.add('ok'); setTimeout(() => { b.textContent = '+'; b.classList.remove('ok'); }, 900); }
}

function rm(id) { delete cart[id]; saveCart(); renderCart(); updateCount(); }

function chq(id, d) {
  if (!cart[id]) return;
  cart[id].qty += d;
  if (cart[id].qty <= 0) delete cart[id];
  saveCart(); renderCart(); updateCount();
}

function updateCount() {
  document.getElementById('cnt').textContent = Object.values(cart).reduce((s, i) => s + i.qty, 0);
}

function renderCart() {
  const el = document.getElementById('clist');
  const items = Object.entries(cart);
  if (!items.length) {
    el.innerHTML = '<div class="empty-msg">🛒<br>កន្ត្រករបស់អ្នកនៅទទេ</div>';
    document.getElementById('ctotal').textContent = '$0.00';
    return;
  }
  el.innerHTML = items.map(([k, i]) => `
    <div class="ci">
      <div class="ci-em">${i.e}</div>
      <div class="ci-info">
        <div class="ci-name">${i.n}</div>
        <div class="ci-qty">
          <button onclick="chq(${k},-1)">−</button>
          <span>${i.qty}</span>
          <button onclick="chq(${k},+1)">+</button>
        </div>
        <div class="ci-price">$${(i.p * i.qty).toFixed(2)}</div>
      </div>
      <button class="ci-rm" onclick="rm(${k})">✕</button>
    </div>`).join('');
  document.getElementById('ctotal').textContent = '$' + items.reduce((s, [, i]) => s + i.p * i.qty, 0).toFixed(2);
}

function openCart() {
  document.getElementById('bg').classList.add('on');
  document.getElementById('drawer').classList.add('on');
  renderCart();
}
function closeCart() {
  document.getElementById('bg').classList.remove('on');
  document.getElementById('drawer').classList.remove('on');
}

function checkout() {
  if (!Object.keys(cart).length) { toast('⚠️ កន្ត្រកនៅទទេ!'); return; }
  const t = Object.values(cart).reduce((s, i) => s + i.p * i.qty, 0);
  toast('✅ បញ្ជាទិញបានជោគជ័យ! $' + t.toFixed(2));
  cart = {}; saveCart(); updateCount(); renderCart(); closeCart();
}

let tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('on');
  clearTimeout(tt); tt = setTimeout(() => el.classList.remove('on'), 2200);
}

updateCount();
render();
</script>
</body>
</html>
